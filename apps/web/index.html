<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
	<meta name="generator" content="Hostinger Horizons" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FocusFlow</title>
	<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div id="error-log" style="position:fixed; z-index:9999; background:red; color:white; top:0; left:0; width:100%; white-space:pre-wrap; padding: 10px; display:none;"></div>
    <script>
      window.addEventListener('error', (event) => {
        const log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerHTML += event.error?.stack || event.message || String(event) + '<br/>';
      });
      window.addEventListener('unhandledrejection', (event) => {
        const log = document.getElementById('error-log');
        log.style.display = 'block';
        log.innerHTML += 'Promise rejection: ' + (event.reason?.stack || event.reason) + '<br/>';
      });
    </script>
	<div id="root"></div>
	<script type="module" src="/src/main.jsx"></script>
</body>

</html>
